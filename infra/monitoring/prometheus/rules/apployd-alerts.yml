groups:
  - name: apployd-alerts
    interval: 30s
    rules:
      - alert: ApploydControlPlaneDown
        expr: up{job="apployd-control-plane"} == 0
        for: 2m
        labels:
          severity: critical
          service: control-plane
        annotations:
          summary: Control plane is down
          description: Prometheus cannot scrape the control-plane metrics endpoint for more than 2 minutes.

      - alert: ApploydDeploymentEngineDown
        expr: up{job="apployd-deployment-engine"} == 0
        for: 2m
        labels:
          severity: critical
          service: deployment-engine
        annotations:
          summary: Deployment engine is down
          description: Prometheus cannot scrape the deployment-engine metrics endpoint for more than 2 minutes.

      - alert: ApploydCadvisorDown
        expr: up{job="cadvisor"} == 0
        for: 10m
        labels:
          severity: warning
          service: cadvisor
        annotations:
          summary: cAdvisor metrics are unavailable
          description: Container-level metrics are missing because cAdvisor has been unreachable for over 10 minutes.

      - alert: ApploydHighHttp5xxRate
        expr: apployd:control:http_5xx_ratio:5m > 0.05
        for: 10m
        labels:
          severity: critical
          service: control-plane
        annotations:
          summary: High API 5xx error rate
          description: 5xx responses are above 5% for at least 10 minutes.

      - alert: ApploydHighHttpLatencyP95
        expr: apployd:control:http_p95_seconds:5m > 1
        for: 10m
        labels:
          severity: warning
          service: control-plane
        annotations:
          summary: High API p95 latency
          description: API p95 latency is above 1 second for at least 10 minutes.

      - alert: ApploydDeploymentFailureBurst
        expr: apployd:engine:deploy_failures_30m >= 3
        for: 5m
        labels:
          severity: warning
          service: deployment-engine
        annotations:
          summary: Deployment failures detected
          description: At least 3 deployments failed in the last 30 minutes.

      - alert: ApploydLowDeploymentSuccessRatio
        expr: apployd:engine:deploy_success_ratio:30m < 0.9
        for: 15m
        labels:
          severity: warning
          service: deployment-engine
        annotations:
          summary: Low deployment success ratio
          description: Deployment success ratio is below 90% over the last 30 minutes.

      - alert: ApploydHostCpuHigh
        expr: apployd:host:cpu_utilization:5m > 90
        for: 10m
        labels:
          severity: warning
          service: host
        annotations:
          summary: Host CPU saturation
          description: Host CPU utilization is above 90% for at least 10 minutes.

      - alert: ApploydHostMemoryHigh
        expr: apployd:host:memory_utilization:5m > 90
        for: 10m
        labels:
          severity: warning
          service: host
        annotations:
          summary: Host memory saturation
          description: Host memory utilization is above 90% for at least 10 minutes.

      - alert: ApploydHostDiskHigh
        expr: apployd:host:disk_utilization:5m > 90
        for: 15m
        labels:
          severity: warning
          service: host
        annotations:
          summary: Host disk saturation
          description: Host disk utilization is above 90% for at least 15 minutes.
